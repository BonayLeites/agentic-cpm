# Override para producción con SSL
# Uso: docker compose -f docker-compose.prod.yml -f docker-compose.ssl.yml up -d
services:
  frontend:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
      - ./frontend/nginx.ssl.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  certbot-webroot:
